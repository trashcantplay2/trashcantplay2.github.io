name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ] # Or 'main', depending on your primary branch

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x

      - name: Publish app
        run: dotnet publish myforfeit/myforfeit.csproj -c Release -o myforfeit/release # Output to myforfeit/release

      # REMOVED: The sed command is no longer needed
      # - name: Change base-tag in index.html from / to myforfeit
      #   run: sed -i 's/<base href="\/" \/>/<base href="\/myforfeit\/" \/>/g' myforfeit/release/wwwroot/index.html

      - name: Copy index.html to 404.html
        run: cp myforfeit/release/wwwroot/index.html myforfeit/release/wwwroot/404.html

      - name: Add .nojekyll file
        run: touch myforfeit/release/wwwroot/.nojekyll

      - name: Commit and Push to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: myforfeit/release/wwwroot
          branch: gh-pages
          base_url: /myforfeit/ # ADDED: This will correctly set the base href