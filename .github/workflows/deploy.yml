name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # Or 'master' if that's your primary branch

# Add this permissions block
permissions:
  contents: write # This is crucial for the deploy action to push files
  pages: write    # Required for GitHub Pages deployment
  id-token: write # Required for GitHub Pages deployment (especially with OIDC)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x

      - name: Publish app
        run: dotnet publish myforfeit/myforfeit.csproj -c Release -o release

      - name: Change base-tag in index.html from / to myforfeit
        run: sed -i 's/<base href="\/" \/>/<base href="\/myforfeit\/" \/>/g' release/wwwroot/index.html

      - name: Copy index.html to 404.html
        run: cp release/wwwroot/index.html release/wwwroot/404.html

      - name: Add .nojekyll file
        run: touch release/wwwroot/.nojekyll

      - name: Commit and Push to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: release/wwwroot
          branch: gh-pages # This is the branch the action will push to